<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Video Chat</title>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {margin:0;font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#0f0f1a,#1a1a2e);color:white;display:flex;justify-content:center;align-items:center;height:100vh}
.container {text-align:center;background:rgba(255,255,255,0.05);padding:20px;border-radius:20px}
button {background:linear-gradient(45deg,#ff4ecd,#6a5cff);border:none;padding:10px 20px;color:white;border-radius:20px;cursor:pointer}
#videos {display:flex;gap:10px;margin-top:15px}
.video-box {width:150px;height:200px;background:black;border-radius:10px}
</style>
</head>
<body>
<div class="container">
<h2>🔥 Live Video Chat</h2>
<button onclick="startCall()">Start Call</button>
<div id="videos">
<div id="local" class="video-box"></div>
<div id="remote" class="video-box"></div>
</div>
</div>

<script>
const APP_ID = "YOUR_AGORA_APP_ID"; // replace
const CHANNEL = "test";
let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
let localTracks = [];

async function startCall() {
  await client.join(APP_ID, CHANNEL, null, null);

  localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();
  const localPlayer = document.getElementById("local");
  localTracks[1].play(localPlayer);

  await client.publish(localTracks);

  client.on("user-published", async (user, mediaType) => {
    await client.subscribe(user, mediaType);
    if (mediaType === "video") {
      const remotePlayer = document.getElementById("remote");
      user.videoTrack.play(remotePlayer);
    }
    if (mediaType === "audio") {
      user.audioTrack.play();
    }
  });
}
</script>
</body>
</html>
