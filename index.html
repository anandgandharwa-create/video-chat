<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Premium Video Chat</title>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
body{
  margin:0;
  background: linear-gradient(135deg,#0f0f1a,#1c1c3c);
  color:white;
  font-family: 'Segoe UI', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  text-align:center;
  background: rgba(255,255,255,0.05);
  padding:25px;
  border-radius:20px;
  backdrop-filter: blur(10px);
  width:280px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h3{
  margin-bottom:10px;
  font-weight:600;
}

select{
  padding:6px;
  border-radius:10px;
  border:none;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background: linear-gradient(45deg,#ff4ecd,#ff7b54);
  color:white;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

button:hover{
  transform: scale(1.05);
}

.video-box{
  width:120px;
  height:160px;
  background:black;
  border-radius:15px;
  margin:5px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.1);
}

#videos{
  display:flex;
  justify-content:center;
  margin-top:10px;
}

.video-box video{
  width:100%;
  height:100%;
  object-fit:cover;
}

#coins{
  color:#ffd700;
  font-weight:bold;
}
</style>
</head>
<body>
<div class="container">
<h3>🔥 Premium Video Chat</h3>

<select id="gender">
<option value="boy">Boy</option>
<option value="girl">Girl</option>
</select>
<p style="font-size:12px;opacity:0.6;">🔥 Live Random Video Chat</p>
<br><br>
<button id="startBtn">🔍 Find Partner</button>
<br><br>
<button id="endBtn">❌ End Call</button>
<div id="videos">
<div id="local" class="video-box"></div>
<div id="remote" class="video-box"></div>
</div>

<p>💰 Coins: <span id="coins">100</span></p>
</div>

<script>
  
window.onload = function(){
// ✅ Firebase config (fixed for your project)
const firebaseConfig = {
  apiKey: "AIzaSyDn7hH-pUftrvnwAj2DNWz7O6eH2Wrv8og",
  authDomain: "videochat-app-5c6da.firebaseapp.com",
  databaseURL: "https://videochat-app-5c6da-default-rtdb.firebaseio.com",
  projectId: "videochat-app-5c6da",
  storageBucket: "videochat-app-5c6da.firebasestorage.app",
  messagingSenderId: "117299228251",
  appId: "1:117299228251:web:c8190ffce9a0d4d9b5997e"
};

// ✅ Initialize Firebase
firebase.initializeApp(firebaseConfig);
const APP_ID = "b169aaaa05074a11bb39002aff39f781";
const TOKEN = "007eJxTYDDjlru90/zRD57XF+e+fxgtxfBk37OubVd+zDCNvtCmeN1IgSHJ0MwyEQgMTA3MTRINDZOSjC0NDIwS09KMLdPMLQwvfTyb2RDIyPD25RtGRgYIBPE5GEpSi0uK8vNzGRgA13olvg==";

let client = null;
let localTracks = [];
let joined = false;

// ✅ Buttons
document.getElementById("startBtn").onclick = startMatch;
document.getElementById("endBtn").onclick = leaveCall;

// ✅ START MATCH
async function startMatch(){
  if(joined){
    alert("Already connected");
    return;
  }

  document.getElementById("startBtn").disabled = true;
  document.getElementById("startBtn").innerText = "Searching...";

  const gender = document.getElementById("gender").value;
  const myId = "user_" + Math.floor(Math.random()*100000);
  const opposite = gender === "boy" ? "girl" : "boy";

  const myRef = firebase.database().ref("waiting_" + gender + "/" + myId);
  const oppRef = firebase.database().ref("waiting_" + opposite);

  // 🔥 STEP 1: check instantly
  const snap = await oppRef.limitToFirst(1).once("value");

  if(snap.exists()){
    const partnerId = Object.keys(snap.val())[0];

    // remove partner
    await oppRef.child(partnerId).remove();

    // ✅ SAME CHANNEL (partnerId)
    await startCall(partnerId);

    joined = true;
    document.getElementById("startBtn").innerText = "Connected ✅";
    return;
  }

  // 🔥 STEP 2: go to waiting
  await myRef.set(true);
  myRef.onDisconnect().remove();

  alert("Waiting for partner...");

  // 🔥 STEP 3: REAL TIME LISTENER (IMPORTANT FIX)
  oppRef.on("child_added", async (snap)=>{

    if(joined) return;

    const partnerId = snap.key;

    if(partnerId === myId) return;

    // remove both
    await myRef.remove();
    await oppRef.child(partnerId).remove();

    // ✅ SAME CHANNEL (partnerId, NOT myId)
    await startCall(partnerId);

    joined = true;
    document.getElementById("startBtn").innerText = "Connected ✅";

    // stop listening
    oppRef.off();
  });
}
// ✅ START CALL
async function startCall(channel){

  client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

  // listeners
  client.on("user-published", async (user, type)=>{
    await client.subscribe(user, type);

    if(type === "video"){
      document.getElementById("remote").innerHTML = "";
      user.videoTrack.play("remote");
    }

    if(type === "audio"){
      user.audioTrack.play();
    }
  });

  client.on("user-unpublished", ()=>{
    document.getElementById("remote").innerHTML = "";
  });

  // join
  let uid = Math.floor(Math.random() * 10000);
  await client.join(APP_ID, channel, TOKEN, uid);

  // tracks
  const [audioTrack, videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
  localTracks = [audioTrack, videoTrack];

  // local video
  document.getElementById("local").innerHTML = "";
  videoTrack.play("local");

  // publish
  await client.publish(localTracks);

  // existing users
  client.remoteUsers.forEach(user => {
    if(user.videoTrack){
      document.getElementById("remote").innerHTML = "";
      user.videoTrack.play("remote");
    }
    if(user.audioTrack){
      user.audioTrack.play();
    }
  });
}

// ✅ END CALL (FIXED)
async function leaveCall(){
  try{
    if(localTracks.length){
      localTracks.forEach(track => {
        track.stop();
        track.close();
      });
      localTracks = [];
    }

    if(client){
      await client.leave();
      client = null;
    }

    document.getElementById("local").innerHTML = "";
    document.getElementById("remote").innerHTML = "";

    joined = false;

    document.getElementById("startBtn").disabled = false;
    document.getElementById("startBtn").innerText = "🔍 Find Partner";

  }catch(e){
    alert("Leave Error: " + e.message);
  }
}

}
</script>
</html>
