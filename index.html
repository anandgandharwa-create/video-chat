<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Premium Video Chat</title>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
body{
  margin:0;
  background: linear-gradient(135deg,#0f0f1a,#1c1c3c);
  color:white;
  font-family: 'Segoe UI', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  text-align:center;
  background: rgba(255,255,255,0.05);
  padding:25px;
  border-radius:20px;
  backdrop-filter: blur(10px);
  width:280px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h3{
  margin-bottom:10px;
  font-weight:600;
}

select{
  padding:6px;
  border-radius:10px;
  border:none;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background: linear-gradient(45deg,#ff4ecd,#ff7b54);
  color:white;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

button:hover{
  transform: scale(1.05);
}

.video-box{
  width:120px;
  height:160px;
  background:black;
  border-radius:15px;
  margin:5px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.1);
}

#videos{
  display:flex;
  justify-content:center;
  margin-top:10px;
}

.video-box video{
  width:100%;
  height:100%;
  object-fit:cover;
}

#coins{
  color:#ffd700;
  font-weight:bold;
}
</style>
</head>
<body>
<div class="container">
<h3>🔥 Premium Video Chat</h3>

<select id="gender">
<option value="boy">Boy</option>
<option value="girl">Girl</option>
</select>
<p style="font-size:12px;opacity:0.6;">🔥 Live Random Video Chat</p>
<br><br>
<button id="startBtn">🔍 Find Partner</button>
<br><br>
<button id="endBtn">❌ End Call</button>
<div id="videos">
<div id="local" class="video-box"></div>
<div id="remote" class="video-box"></div>
</div>

<p>💰 Coins: <span id="coins">100</span></p>
</div>

<script>

window.onload = function(){

// ✅ Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDn7hH-pUftrvnwAj2DNWz7O6eH2Wrv8og",
  authDomain: "videochat-app-5c6da.firebaseapp.com",
  databaseURL: "https://videochat-app-5c6da-default-rtdb.firebaseio.com",
  projectId: "videochat-app-5c6da",
  storageBucket: "videochat-app-5c6da.firebasestorage.app",
  messagingSenderId: "117299228251",
  appId: "1:117299228251:web:c8190ffce9a0d4d9b5997e"
};

firebase.initializeApp(firebaseConfig);

// 🔥 Agora Config
const APP_ID = "b169aaaa05074a11bb39002aff39f781";
const TOKEN = "007eJxTYHixeYJFhOwSb/MMY9947v12YrN2m6V/i92ZXfl2q1Hs7hIFhiRDM8tEIDAwNTA3STQ0TEoytjQwMEpMSzO2TDO3MHwvczGzIZCRQWRPCRMjAwSC+OwMJanFJYZGxgwMAFGvHyA="; // 👈 token yahan paste karo
const CHANNEL = "test123"; // 👈 same channel for testing

let client = null;
let localTracks = [];
let joined = false;

// ✅ Buttons
document.getElementById("startBtn").onclick = startMatch;
document.getElementById("endBtn").onclick = leaveCall;

// 🔥 START MATCH
async function startMatch(){
  if(joined){
    alert("Already connected");
    return;
  }

  document.getElementById("startBtn").disabled = true;
  document.getElementById("startBtn").innerText = "Connecting...";

  await startCall();

  joined = true;
  document.getElementById("startBtn").innerText = "Connected ✅";
}

// 🔥 AGORA CALL START
async function startCall(){

  client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

  client.on("user-published", async (user, mediaType) => {
    await client.subscribe(user, mediaType);

    if(mediaType === "video"){
      const remoteDiv = document.getElementById("remote");
      remoteDiv.innerHTML = "";
      user.videoTrack.play(remoteDiv);
    }

    if(mediaType === "audio"){
      user.audioTrack.play();
    }
  });

  await client.join(APP_ID, CHANNEL, TOKEN || null, null);

  localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();

  const localDiv = document.getElementById("local");
  localDiv.innerHTML = "";
  localTracks[1].play(localDiv);

  await client.publish(localTracks);
}

// 🔥 END CALL
async function leaveCall(){
  try{
    if(localTracks.length){
      localTracks.forEach(track => {
        track.stop();
        track.close();
      });
      localTracks = [];
    }

    if(client){
      await client.leave();
      client = null;
    }

    document.getElementById("local").innerHTML = "";
    document.getElementById("remote").innerHTML = "";

    joined = false;

    document.getElementById("startBtn").disabled = false;
    document.getElementById("startBtn").innerText = "🔍 Find Partner";

  }catch(e){
    alert("Leave Error: " + e.message);
  }
}

}

</script>
</html>
