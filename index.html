<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Video Chat</title>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
body{margin:0;background:#0f0f1a;color:white;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh}
.container{text-align:center;background:#1a1a2e;padding:20px;border-radius:15px}
button{padding:10px 20px;border:none;border-radius:20px;background:#ff4ecd;color:white;cursor:pointer}
.video-box{width:140px;height:180px;background:black;border-radius:10px;margin:5px}
#videos{display:flex;justify-content:center}
</style>
</head>
<body>
<div class="container">
<h3>🔥 Premium Video Chat</h3>

<select id="gender">
<option value="boy">Boy</option>
<option value="girl">Girl</option>
</select>

<br><br>
<button id="startBtn">Find Partner</button>

<div id="videos">
<div id="local" class="video-box"></div>
<div id="remote" class="video-box"></div>
</div>

<p>💰 Coins: <span id="coins">100</span></p>
</div>

<script>
window.onload = function(){

let coins = 100;

// Firebase
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Agora
const APP_ID = "YOUR_AGORA_APP_ID";
let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
let localTracks;

// ✅ अब सही attach होगा
document.getElementById("startBtn").addEventListener("click", startMatch);

async function startMatch(){
  try{
    alert("Button working ✅"); // 👈 पहले test

    if(coins <= 0){ 
      alert("No coins"); 
      return; 
    }

    let channel = "testroom";
    startCall(channel);

  }catch(e){
    alert("Error: " + e.message);
  }
}

async function startCall(channel){
  await client.join(APP_ID, channel, null, null);

  localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();
  localTracks[1].play("local");

  await client.publish(localTracks);

  client.on("user-published", async (user, type)=>{
    await client.subscribe(user, type);

    if(type === "video"){
      user.videoTrack.play("remote");
    }
    if(type === "audio"){
      user.audioTrack.play();
    }
  });

  startCoins();
}

function startCoins(){
  setInterval(()=>{
    coins--;
    document.getElementById("coins").innerText = coins;

    if(coins <= 0){
      alert("Coins खत्म");
      location.reload();
    }
  }, 5000);
}

}
</script>
</body>
</html>
