<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Video Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.container {
  text-align: center;
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

h1 {
  color: #ff4ecd;
}

button {
  background: linear-gradient(45deg, #ff4ecd, #6a5cff);
  border: none;
  padding: 12px 25px;
  color: white;
  border-radius: 25px;
  cursor: pointer;
  font-size: 16px;
  margin-top: 15px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

video {
  width: 300px;
  border-radius: 15px;
  margin-top: 15px;
  background: black;
}

.chat-box {
  margin-top: 15px;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  width: 70%;
}

.send-btn {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #6a5cff;
  color: white;
}

.coin {
  margin-top: 10px;
  color: gold;
}
</style>
</head>
<body>

<div class="container">
  <h1>🔥 Live Video Chat</h1>
  <p>Connect with random people</p>
  <button onclick="startCall()">Start Call</button>

  <video id="localVideo" autoplay muted></video>

  <div class="chat-box">
    <input type="text" placeholder="Type message...">
    <button class="send-btn">Send</button>
  </div>

  <div class="coin">💰 Coins: 100</div>
</div>

<script>
async function startCall() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('localVideo').srcObject = stream;
  } catch (err) {
    alert("Camera access denied");
  }
}
</script>

</body>
</html>
